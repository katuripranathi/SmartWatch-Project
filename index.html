<!DOCTYPE html>
<html>

<head>
    <title>Smart Watch Project</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <div class="top-bar">
        <img
            src="https://pngimg.com/uploads/amazon/amazon_PNG11.png"
            alt="Amazon Logo">
    </div>

    <div class="container">

        <!-- Left Section -->
        <div class="left-section">

            <div class="watch-container">

                <img
                    id="watch-image"
                    src="./images/black.png"
                    alt="Smart Watch">

                <div id="watch-content">
                    00:00:00
                </div>

            </div>

        </div>

        <!-- Right Section -->
        <div class="right-section">

            <h1>FitBit 19 - The Smartest Watch</h1>

            <p>
                FitBit 19 is a premium smartwatch featuring
                real-time clock display, heart rate monitoring,
                and multiple color options.
            </p>

            <h3>Select Color</h3>

            <button id="black-btn" class="color-btn black"></button>

            <button id="red-btn" class="color-btn red"></button>

            <button id="blue-btn" class="color-btn blue"></button>

            <button id="pink-btn" class="color-btn pink"></button>

            <button id="purple-btn" class="color-btn purple"></button>

            <h3>Features</h3>

            <button id="time-btn" class="feature-btn">
                Time
            </button>

            <button id="heart-btn" class="feature-btn">
                Heart Rate
            </button>

            <br><br>

            <button id="buy-btn">
                BUY NOW
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
